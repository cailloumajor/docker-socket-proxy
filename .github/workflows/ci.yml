name: Continuous integration

on:
  push:
    branches:
      - main
      - renovate/**
  pull_request:
    branches:
      - main

jobs:
  pre_job:
    permissions:
      actions: write
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      should_skip: ${{ steps.skip_check.outputs.should_skip }}
    steps:
      - id: skip_check
        uses: fkirc/skip-duplicate-actions@v5
        with:
          concurrent_skipping: same_content
          do_not_skip: '["pull_request", "release", "workflow_dispatch", "schedule"]'
          skip_after_successful_duplicate: true
  ci:
    name: Tests and code quality
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Setup Go cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
      - name: Run CI task
        env:
          GITHUB_TOKEN: ${{ github.token }}
          HK_FAIL_FAST: true
          HK_STATE_DIR: ${{ runner.temp }}/hk
        run: mise run ci
      - name: Upload lint task output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: lint-task-results
          path: ${{ runner.temp }}/hk/output.log
          archive: false
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          flags: unittests
  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: pre_job
    if: needs.pre_job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Run integration tests
        run: ./smoke_test.sh --log-file ${{ runner.temp }}/integration_tests.log
        working-directory: integration
      - name: Print service logs
        if: success() || failure()
        run: cat ${{ runner.temp }}/integration_tests.log
