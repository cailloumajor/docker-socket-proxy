[tools]
actionlint = "latest"
"aqua:go-delve/delve" = "latest"
betterleaks = "latest"
editorconfig-checker = "latest"
ghalint = "latest"
go = "1.25.5"
"go:golang.org/x/tools/cmd/goimports" = "latest"
"go:golang.org/x/tools/gopls" = "latest"
gofumpt = "latest"
golangci-lint = "latest"
golangci-lint-langserver = "latest"
hadolint = "latest"
hk = "latest"
node = "lts"
"npm:dockerfile-language-server-nodejs" = "latest"
"npm:yaml-language-server" = "latest"
pinact = "latest"
pkl = "latest"
tombi = "latest"

[hooks]
enter = "mise outdated --local --silent"

[tasks.lint]
description = "Run hk lints"
run = "hk check --all"

[tasks."test:usage"]
description = "Check command usage in README.md"
run = """
#!/usr/bin/env bash
diff <(go run . -help 2>&1) <(mdq '# Usage | ```' < README.md | tail -n +3 | head -n-1)
"""

[tasks."test:usage".tools]
"github:yshavit/mdq" = "latest"

[tasks."test:unit"]
description = "Run unit tests and code coverage"
run = "go test -coverprofile cover.out -race -v ./..."

[tasks.ci]
description = "Run CI related tasks"
depends = ["lint", "test:*"]
run = "echo 'CI completed successfully'"
